name: Generate and Distribute Article

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 11 * * *"
    - cron: "0 14 * * *"
    - cron: "0 17 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m generator.generate

      - name: Commit and push article
        run: |
          git config user.name "Outreachly Bot"
          git config user.email "bot@outreachly.pro"
          git add docs/_posts/ keywords.json
          git diff --staged --quiet || git commit -m "feat: publish article $(date +%Y-%m-%d-%H%M%S)"
          for i in 1 2 3 4 5; do
            git push && break
            git pull --rebase
            sleep $((i * 2))
          done

      - name: Distribute article
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python -m distributor.distribute
