name: Generate Article

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generator/generate.py

      - name: Commit and push
        run: |
          git config user.name "Outreachly Bot"
          git config user.email "bot@outreachly.pro"
          git add site/_posts/ keywords.json
          git diff --staged --quiet || git commit -m "feat: publish article $(date +%Y-%m-%d)"
          git push
